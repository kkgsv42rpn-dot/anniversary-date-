<!DOCTYPE html>
<html>
<head>
    <title>Date Invitation</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background: #ffe6ec;
            padding-top: 100px;
        }

        h1 {
            color: #ff3366;
        }

        button {
            padding: 15px 30px;
            margin: 10px;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            cursor: pointer;
        }

        .yes {
            background: #4CAF50;
            color: white;
        }

        .no {
            background: #ff4d4d;
            color: white;
        }
    </style>
</head>

<body>

<h1>Will you go on a date with me on Sunday, October 18? ❤️</h1>

<button class="yes" onclick="yesAnswer()">
    Yes
</button>

<button class="no" onclick="noAnswer()">
    No
</button>

<script>
function yesAnswer() {
    document.body.innerHTML =
    "<h1>Yay! ❤️ I can't wait!</h1>";
}

function noAnswer() {
    alert('Are you sure? 😢');
}
</script>

</video>

<br><br>
</body>
</html>
